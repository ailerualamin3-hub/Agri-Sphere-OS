openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FREGE AI – FregeOS Agricultural Operating System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: farmer
    description: Farmer profile and identity
  - name: dashboard
    description: Home dashboard data
  - name: farmgpt
    description: AI assistant interactions
  - name: farm
    description: Farm management
  - name: crops
    description: Crop management
  - name: livestock
    description: Livestock management
  - name: market
    description: AgriMarket operations
  - name: farmconnect
    description: Community collaboration
  - name: neuroscore
    description: Farmer intelligence score
  - name: climate
    description: Climate intelligence

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── FARMER PROFILE ───────────────────────────────────────────────────────
  /farmer/profile:
    get:
      operationId: getFarmerProfile
      tags: [farmer]
      summary: Get current farmer profile
      responses:
        "200":
          description: Farmer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmerProfile"
    patch:
      operationId: updateFarmerProfile
      tags: [farmer]
      summary: Update farmer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmerProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmerProfile"

  # ─── DASHBOARD ─────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get full dashboard summary (weather, farm health, AI insights)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/ai-insights:
    get:
      operationId: getAiInsights
      tags: [dashboard]
      summary: Get personalized AI insights feed
      responses:
        "200":
          description: AI insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiInsight"

  /dashboard/emergency-contacts:
    get:
      operationId: getEmergencyContacts
      tags: [dashboard]
      summary: Get nearest emergency service contacts
      parameters:
        - in: query
          name: lat
          schema:
            type: number
        - in: query
          name: lng
          schema:
            type: number
      responses:
        "200":
          description: Emergency contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmergencyContact"

  # ─── GOVERNMENT OPPORTUNITIES ─────────────────────────────────────────────
  /opportunities:
    get:
      operationId: getOpportunities
      tags: [dashboard]
      summary: Get government and NGO agricultural opportunities
      responses:
        "200":
          description: List of opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GovernmentOpportunity"

  /opportunities/{id}:
    get:
      operationId: getOpportunity
      tags: [dashboard]
      summary: Get a single opportunity by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Opportunity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernmentOpportunity"

  /opportunities/scans/history:
    get:
      operationId: getScanHistory
      tags: [dashboard]
      summary: Get farmer scan history
      responses:
        "200":
          description: Scan history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScanResult"

  /opportunities/scans:
    post:
      operationId: saveScanResult
      tags: [dashboard]
      summary: Save a completed scan result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanResultInput"
      responses:
        "201":
          description: Saved scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"

  # ─── SEASON PLANNER ─────────────────────────────────────────────────────────
  /season-planner/generate:
    post:
      operationId: generateSeasonPlan
      tags: [dashboard]
      summary: Generate AI season planting plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeasonPlanInput"
      responses:
        "200":
          description: Season plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonPlan"

  # ─── CLIMATE INTELLIGENCE ──────────────────────────────────────────────────
  /climate/forecast:
    get:
      operationId: getClimateForecast
      tags: [climate]
      summary: Get climate forecast and risk assessment
      responses:
        "200":
          description: Climate forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClimateForecast"

  # ─── FARMGPT ───────────────────────────────────────────────────────────────
  /farmgpt/conversations:
    get:
      operationId: getFarmGptConversations
      tags: [farmgpt]
      summary: List FarmGPT conversation history
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createFarmGptConversation
      tags: [farmgpt]
      summary: Start a new FarmGPT conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /farmgpt/conversations/{conversationId}/messages:
    get:
      operationId: getFarmGptMessages
      tags: [farmgpt]
      summary: Get messages in a conversation
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendFarmGptMessage
      tags: [farmgpt]
      summary: Send a message to FarmGPT
      parameters:
        - in: path
          name: conversationId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent with AI reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagePair"

  # ─── FARM MANAGEMENT ───────────────────────────────────────────────────────
  /farms:
    get:
      operationId: getFarms
      tags: [farm]
      summary: List all farms for the farmer
      responses:
        "200":
          description: Farms list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Farm"
    post:
      operationId: createFarm
      tags: [farm]
      summary: Create a new farm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmInput"
      responses:
        "201":
          description: Created farm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"

  /farms/{farmId}:
    get:
      operationId: getFarm
      tags: [farm]
      summary: Get a specific farm
      parameters:
        - in: path
          name: farmId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Farm details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"
    patch:
      operationId: updateFarm
      tags: [farm]
      summary: Update farm details
      parameters:
        - in: path
          name: farmId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmUpdate"
      responses:
        "200":
          description: Updated farm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farm"

  /farms/summary:
    get:
      operationId: getFarmSummary
      tags: [farm]
      summary: Get aggregated farm health summary
      responses:
        "200":
          description: Farm summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmSummary"

  # ─── CROPS ─────────────────────────────────────────────────────────────────
  /crops:
    get:
      operationId: getCrops
      tags: [crops]
      summary: List all crops
      responses:
        "200":
          description: Crops list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Crop"
    post:
      operationId: createCrop
      tags: [crops]
      summary: Add a new crop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CropInput"
      responses:
        "201":
          description: Created crop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Crop"

  /crops/{cropId}:
    get:
      operationId: getCrop
      tags: [crops]
      summary: Get crop details
      parameters:
        - in: path
          name: cropId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Crop details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Crop"
    patch:
      operationId: updateCrop
      tags: [crops]
      summary: Update crop record
      parameters:
        - in: path
          name: cropId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CropUpdate"
      responses:
        "200":
          description: Updated crop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Crop"
    delete:
      operationId: deleteCrop
      tags: [crops]
      summary: Delete crop
      parameters:
        - in: path
          name: cropId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── LIVESTOCK ─────────────────────────────────────────────────────────────
  /livestock:
    get:
      operationId: getLivestock
      tags: [livestock]
      summary: List all livestock records
      responses:
        "200":
          description: Livestock list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Animal"
    post:
      operationId: createAnimal
      tags: [livestock]
      summary: Add a new animal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnimalInput"
      responses:
        "201":
          description: Created animal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"

  /livestock/{animalId}:
    get:
      operationId: getAnimal
      tags: [livestock]
      summary: Get animal details
      parameters:
        - in: path
          name: animalId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Animal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"
    patch:
      operationId: updateAnimal
      tags: [livestock]
      summary: Update animal record
      parameters:
        - in: path
          name: animalId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnimalUpdate"
      responses:
        "200":
          description: Updated animal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Animal"
    delete:
      operationId: deleteAnimal
      tags: [livestock]
      summary: Delete animal
      parameters:
        - in: path
          name: animalId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /livestock/summary:
    get:
      operationId: getLivestockSummary
      tags: [livestock]
      summary: Get livestock health and count summary
      responses:
        "200":
          description: Livestock summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivestockSummary"

  # ─── MARKET (AgriMarket) ────────────────────────────────────────────────────
  /market/prices:
    get:
      operationId: getMarketPrices
      tags: [market]
      summary: Get current market prices for crops and livestock
      responses:
        "200":
          description: Market prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketPrice"

  /market/listings:
    get:
      operationId: getMarketListings
      tags: [market]
      summary: List all market listings
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [crop, livestock, input, equipment]
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketListing"
    post:
      operationId: createMarketListing
      tags: [market]
      summary: Create a new market listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketListingInput"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListing"

  /market/listings/{listingId}:
    get:
      operationId: getMarketListing
      tags: [market]
      summary: Get listing details
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListing"
    delete:
      operationId: deleteMarketListing
      tags: [market]
      summary: Delete a listing
      parameters:
        - in: path
          name: listingId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /market/summary:
    get:
      operationId: getMarketSummary
      tags: [market]
      summary: Get market activity summary and trending prices
      responses:
        "200":
          description: Market summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSummary"

  # ─── FARMCONNECT ────────────────────────────────────────────────────────────
  /farmconnect/feed:
    get:
      operationId: getFarmConnectFeed
      tags: [farmconnect]
      summary: Get community feed posts
      responses:
        "200":
          description: Feed posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityPost"

  /farmconnect/posts:
    post:
      operationId: createCommunityPost
      tags: [farmconnect]
      summary: Create a community post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityPostInput"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPost"

  /farmconnect/posts/{postId}/like:
    post:
      operationId: likeCommunityPost
      tags: [farmconnect]
      summary: Like a community post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityPost"

  /farmconnect/nearby-farmers:
    get:
      operationId: getNearbyFarmers
      tags: [farmconnect]
      summary: Get verified farmers nearby
      parameters:
        - in: query
          name: radiusKm
          schema:
            type: number
      responses:
        "200":
          description: Nearby farmers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NearbyFarmer"

  /farmconnect/groups:
    get:
      operationId: getFarmerGroups
      tags: [farmconnect]
      summary: List farmer groups
      responses:
        "200":
          description: Groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FarmerGroup"
    post:
      operationId: createFarmerGroup
      tags: [farmconnect]
      summary: Create a farmer group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FarmerGroupInput"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmerGroup"

  /farmconnect/labour-exchange:
    get:
      operationId: getLabourExchangeListings
      tags: [farmconnect]
      summary: Get labour exchange requests
      responses:
        "200":
          description: Labour requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabourExchange"
    post:
      operationId: createLabourExchange
      tags: [farmconnect]
      summary: Post a labour exchange request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LabourExchangeInput"
      responses:
        "201":
          description: Created request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabourExchange"

  /farmconnect/equipment-exchange:
    get:
      operationId: getEquipmentExchange
      tags: [farmconnect]
      summary: Get equipment sharing listings
      responses:
        "200":
          description: Equipment listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquipmentExchange"
    post:
      operationId: createEquipmentExchange
      tags: [farmconnect]
      summary: Post an equipment for sharing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentExchangeInput"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentExchange"

  /farmconnect/seed-exchange:
    get:
      operationId: getSeedExchange
      tags: [farmconnect]
      summary: Get seed and seedling exchange listings
      responses:
        "200":
          description: Seed exchange listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SeedExchange"
    post:
      operationId: createSeedExchange
      tags: [farmconnect]
      summary: Post a seed exchange listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeedExchangeInput"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeedExchange"

  /farmconnect/events:
    get:
      operationId: getCommunityEvents
      tags: [farmconnect]
      summary: Get upcoming community events
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityEvent"
    post:
      operationId: createCommunityEvent
      tags: [farmconnect]
      summary: Create a community event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommunityEventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityEvent"

  /farmconnect/community-summary:
    get:
      operationId: getFarmConnectSummary
      tags: [farmconnect]
      summary: Get FarmConnect activity summary and reputation stats
      responses:
        "200":
          description: Community summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmConnectSummary"

  # ─── NEUROSCORE ─────────────────────────────────────────────────────────────
  /neuroscore:
    get:
      operationId: getNeuroScore
      tags: [neuroscore]
      summary: Get farmer NeuroScore and Farm Passport
      responses:
        "200":
          description: NeuroScore data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NeuroScore"

  /neuroscore/breakdown:
    get:
      operationId: getNeuroScoreBreakdown
      tags: [neuroscore]
      summary: Get detailed NeuroScore factor breakdown
      responses:
        "200":
          description: Score breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NeuroScoreBreakdown"

  /neuroscore/readiness:
    get:
      operationId: getReadinessScores
      tags: [neuroscore]
      summary: Get loan, investor, insurance, and NGO readiness scores
      responses:
        "200":
          description: Readiness scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessScores"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── FARMER ─────────────────────────────────────────────────────────────
    FarmerProfile:
      type: object
      required: [id, name, phone, state, lga, farmingType, verificationStatus, neuroScore, communityReputation, credits, joinedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        state:
          type: string
        lga:
          type: string
        farmingType:
          type: string
          enum: [crop, livestock, mixed, cooperative]
        verificationStatus:
          type: string
          enum: [unverified, pending, verified]
        neuroScore:
          type: number
        communityReputation:
          type: string
          enum: [Bronze, Silver, Gold, Platinum, Trusted]
        credits:
          type: integer
        joinedAt:
          type: string

    FarmerProfileUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        state:
          type: string
        lga:
          type: string
        farmingType:
          type: string

    # ─── DASHBOARD ───────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [weather, farmHealth, aiInsights, climateRisks]
      properties:
        weather:
          $ref: "#/components/schemas/WeatherData"
        farmHealth:
          $ref: "#/components/schemas/FarmHealthCard"
        aiInsights:
          type: array
          items:
            $ref: "#/components/schemas/AiInsight"
        climateRisks:
          $ref: "#/components/schemas/ClimateRisks"

    WeatherData:
      type: object
      required: [temperature, humidity, windSpeed, rainProbability, condition, location]
      properties:
        temperature:
          type: number
        humidity:
          type: number
        windSpeed:
          type: number
        rainProbability:
          type: number
        condition:
          type: string
        location:
          type: string

    FarmHealthCard:
      type: object
      required: [overallScore, cropHealthStatus, livestockHealthStatus, activeFarms, activeCrops, activeAnimals]
      properties:
        overallScore:
          type: number
        cropHealthScore:
          type: ["number", "null"]
        livestockHealthScore:
          type: ["number", "null"]
        soilHealthScore:
          type: ["number", "null"]
        cropHealthStatus:
          type: string
          enum: [excellent, good, fair, poor, critical]
        livestockHealthStatus:
          type: string
          enum: [excellent, good, fair, poor, critical]
        activeFarms:
          type: integer
        activeCrops:
          type: integer
        activeAnimals:
          type: integer

    AiInsight:
      type: object
