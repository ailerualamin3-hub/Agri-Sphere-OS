kind = "web"
previewPath = "/"
title = "FREGE AI – FregeOS"
version = "1.0.0"
id = "artifacts/frege-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21988

[services.development]
run = "pnpm --filter @workspace/frege-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/frege-ai", "run", "build" ]
publicDir = "artifacts/frege-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21988"
BASE_PATH = "/"
